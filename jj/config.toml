[user]
name = "Felipe Sere"
email = "github@felipesere.com"

[ui]
editor = "nvim"
default-command = ["log", "--limit", "10"]
diff-editor = ":builtin"

[[--scope]]
--when.commands = ["diff", "show"]
[--scope.ui]
pager = "delta"
diff-formatter = ":git"

[template-aliases]
'format_timestamp(timestamp)' = 'timestamp.ago()'

[templates]
draft_commit_description = 'builtin_draft_commit_description_with_diff'
git_push_bookmark = '"felipesere/push-" ++ change_id.short()'

[git]
sign-on-push = true

[revset-aliases]
bot_author = '(author(tl-renovate) | author(dependabot))'
trunk = 'trunk()'
merged = '::trunk()'
near_bookmark = 'latest(::@ & bookmarks())'
proper_tags = 'tags(regex:"v\\d+.\\d+.\\d+$")'
'around(r, depth)' =  'ancestors(r, depth) | descendants(r, depth)'
'around(r)' =  'ancestors(r, 5) | descendants(r, 5)'
'around_fork(left, right)' = 'around(fork_point(left | right), 5) | left | right'
eops = 'author_name(substring-i:"felipe") | author_name(substring-i:"eirik") | author_name(substring-i:"weichung")'
'branch(x)' = 'fork_point(main | x)..x'

[aliases]
l = ["log", "-n", "20"]
ll = ["log", "-n", "20", "-r", "::trunk() | ::@"]
lll = ["log", "-r", "::trunk() | ::@"]
tug = ["bookmark", "advance"]
tug- = ["bookmark", "advance", "--to", "@-"]
conflicts = ["log", "-r", "@", "-T", "conflicted_files.map(|f| f.path()).join(\"\\n\")", "--no-graph"]
up = ["util", "exec", "--", "bash", "-c", """
#!/usr/bin/env bash
jj git fetch && jj new trunk
""", ""]
view-pr = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
#!/usr/bin/env bash

NEAREST_BOOKMARK=$(jj log --no-graph -r 'near_bookmark' -T 'bookmarks' | sed 's/\\*//')
BOOKMARK="${1:-$NEAREST_BOOKMARK}"

gh pr view $BOOKMARK -w
""",
  "",
]

create-pr = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
  #!/usr/bin/env bash
  set -euo pipefail

  # Get descriptions of changes between trunk and @
  descriptions=$(jj log --no-graph -r 'trunk()..@' -T 'if(description,
  description.first_line() ++ "\n")')

  # Count non-empty lines
  count=$(echo "$descriptions" | grep -c '.' || true)

  if [[ "$count" -eq 0 ]]; then
    # No existing descriptions, go straight to custom input
    desc=$(gum input --placeholder "Enter a description...")
  elif [[ "$count" -eq 1 ]]; then
    # Only one description, use it directly
    desc=$(echo "$descriptions" | grep '.')
  else
    # Multiple descriptions, let the user pick or write their own
    desc=$(printf '%s\n%s' "$descriptions" "[custom]" \
      | grep '.' \
      | gum filter --placeholder "Pick a description...")
  fi

  # If they picked [custom] or we need input
  if [[ "$desc" == "[custom]" || -z "$desc" ]]; then
    desc=$(gum input --placeholder "Enter a description...")
  fi

  branch="$(jj repo-trunk)"

  gh pr create \
  --head $(jj log -r "${1:-@}" --no-graph --color=never -T 'bookmarks') --base "${branch%@origin}" --draft --title "$desc" --body ""
""",
  "",
]

web = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
  #!/usr/bin/env bash
  open $(jj log -r @ -T 'git_web_url()' --no-graph)
""", ""]



repo-trunk = [
  "log",
  "--revisions",
  "trunk()",
  "--no-graph",
  "--color=never",
  "-T",
  "bookmarks",
]

prs = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
  #!/usr/bin/env bash
   PR_BOOKMARK=$(gh pr list --json number,title,headRefName \
         | fzj --format '#{number} {title}'\
         | jq -r '.headRefName')
  jj bookmark track "$PR_BOOKMARK" --remote=origin
  jj new $PR_BOOKMARK
""", ""]

ci = [
   "util",
   "exec",
   "--",
   "bash",
   "-c",
   """
   #!/usr/bin/env bash
   if jj root >/dev/null 2>&1; then
      repo=$(basename $(jj root))
      open "https://app.circleci.com/pipelines/github/TrueLayer/$repo"
   fi
""", ""]

